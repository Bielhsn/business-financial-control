server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão para reduzir o tamanho transferido.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
        application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # Encaminha a API para o serviço backend na rede do compose.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Assets com hash no nome podem ser cacheados agressivamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota desconhecida cai no index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
